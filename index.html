<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Saint Louis Events — Weekly Cultural Calendar</title>

    <!-- Identity. -->
    <meta name="application-name" content="Saint Louis Events" />
    <meta name="author" content="Saint Louis Events" />
    <meta name="description" content="A curated weekly calendar of music, art, festivals, and community events across Saint Louis." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mcckyle.github.io/the-calendar/" />

    <!-- Performance. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Open Graph. -->
    <meta property="og:title" content="Saint Louis Events — Weekly Cultural Calendar" />
    <meta property="og:description" content="Explore music, art, festivals, and community life across Saint Louis" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Saint Louis Events" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://mcckyle.github.io/the-calendar/" />
    <meta property="og:image" content="https://mcckyle.github.io/the-calendar/og-preview.png" />

    <!-- Theme. -->
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f4f7fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />

    <!-- PWA. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="STL Events" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Fonts. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="preload" href="/src/main.jsx" as="script" type="module" />
  </head>

  <body>
    <noscript>
      <p style="padding: 2rem; font-family: system-ui, sans-serif;">
        This calendar requires JavaScript to run.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
